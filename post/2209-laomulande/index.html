            <h2 class="post-title">劳穆兰德之诗</h2>
            <div class="post-date">2022-09-15</div>
            
            <div class="post-content" v-pre>
              <p>此诗献给风<br>
此诗献给月<br>
此诗献给正午的太阳和不屈的灵魂<br>
此诗献给你</p>
<p>劳穆兰德<br>
穿越黑暗的星域<br>
在绝望之国点燃革命之火<br>
他像一把钥匙<br>
打开智慧之锁<br>
开启自由之门</p>
<p>劳穆兰德<br>
也是毁灭<br>
是大刀砍向颈项<br>
是血流如火<br>
是强大意志对生命尊严的踏削</p>
<p>劳穆兰德<br>
是神还是魔<br>
还是超凡之人<br>
他不在乎<br>
你也不应该<br>
他给你的武器已经铸就</p>
