            <div class="post-content" v-pre>
              <p>我侧卧在凉席上感受思维的流动<br>
我感受我的感受<br>
是元感受<br>
在元宇宙<br>
我们的宇宙<br>
现实被映射成虚拟的概念<br>
名为 token 的象征物<br>
携带着被修饰过的元数据<br>
它们定义了我们的记忆</p>
<p>我在记忆中拼接碎裂的过去<br>
分不清是经历<br>
还是幻觉或某一场梦<br>
那些灾难和不幸啊<br>
发生了又被遗忘<br>
没有被反复讨论<br>
形成戒律<br>
为后世之镜<br>
于是我便始终没有长大<br>
毕竟我们终究只是记忆的仆从</p>
